<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rescue 1122 - Pakistan Emergency Portal</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --pak-green: #006633;
            --pak-green-dark: #004d26;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #1f2937;
            --text-light: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Premium Pakistan themed background gradient */
            background: linear-gradient(135deg, rgba(0, 102, 51, 0.85) 0%, rgba(20, 83, 45, 0.95) 100%), 
                        url('https://images.unsplash.com/photo-1588681664899-f142ff2dc9b1?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Glassmorphism Container */
        .container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 
                        inset 0 0 0 1px rgba(255,255,255,0.2);
            width: 100%;
            max-width: 480px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.8s ease-out;
        }

        /* Decorative top accent */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #006633, #00b359, #006633);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            margin-bottom: 30px;
        }

        .logo-container {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: rgba(0, 102, 51, 0.1);
            border-radius: 50%;
            margin-bottom: 15px;
            color: var(--pak-green);
            font-size: 32px;
            box-shadow: 0 0 20px rgba(0, 102, 51, 0.15);
        }

        .logo-text {
            color: var(--pak-green);
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .tagline {
            color: var(--text-light);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            transition: 0.3s;
        }

        input, select {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--pak-green);
            box-shadow: 0 0 0 4px rgba(0, 102, 51, 0.1);
            background: #fff;
        }

        input:focus + i, select:focus + i {
            color: var(--pak-green);
        }

        select {
            appearance: none;
            cursor: pointer;
        }

        /* Custom dropdown arrow */
        .select-wrapper::after {
            content: '\f107';
            font-family: 'FontAwesome';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            pointer-events: none;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--pak-green) 0%, var(--pak-green-dark) 100%);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(0, 102, 51, 0.2);
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 102, 51, 0.3);
            background: linear-gradient(135deg, #007a3d 0%, #00592c 100%);
        }

        button:active {
            transform: translateY(1px);
        }

        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
        }

        /* Status Modal */
        #status-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            animation: modalPop 0.3s forwards;
        }

        @keyframes modalPop {
            to { transform: scale(1); }
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            background: #d1fae5;
            color: #059669;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }

        .modal-title {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .modal-text {
            color: var(--text-light);
            font-size: 15px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .close-btn {
            background: var(--text-dark);
            box-shadow: none;
        }
        
        .close-btn:hover {
            background: #000;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .distance-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid rgba(0,0,0,0.05);
            border-radius: 12px;
            padding-right: 14px;
            transition: all 0.3s ease;
        }
        
        .distance-wrapper:focus-within {
            border-color: var(--pak-green);
            box-shadow: 0 0 0 4px rgba(0, 102, 51, 0.1);
            background: #fff;
        }

        .distance-wrapper input {
            border: none;
            background: transparent;
            box-shadow: none;
            width: 100%;
        }
        
        .distance-wrapper input:focus {
            box-shadow: none;
        }
        
        .distance-suffix {
            color: var(--text-light);
            font-weight: 600;
            font-size: 14px;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo-container">
            <i class="fa-solid fa-truck-medical"></i>
        </div>
        <div class="logo-text">RESCUE 1122</div>
        <div class="tagline">Government of Pakistan Emergency Portal</div>
    </div>
    
    <form id="emergencyForm">
        <div class="form-group">
            <label>Full Name</label>
            <div class="input-wrapper">
                <i class="fa-regular fa-user"></i>
                <input type="text" id="name" placeholder="Enter patient/victim name" required>
            </div>
        </div>

        <div class="form-group">
            <label>Pakistani Contact Number</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-phone"></i>
                <input type="tel" id="phone" placeholder="03xx-xxxxxxx" pattern="03[0-9]{2}-[0-9]{7}" required title="Format: 03xx-xxxxxxx">
            </div>
        </div>

        <div class="form-group">
            <label>Emergency Type</label>
            <div class="input-wrapper select-wrapper">
                <i class="fa-solid fa-bell"></i>
                <select id="type" required>
                    <option value="" disabled selected>Select emergency type...</option>
                    <option value="Medical / Ambulance">Medical / Ambulance</option>
                    <option value="Fire Brigade">Fire Brigade</option>
                    <option value="Police (15)">Police (15)</option>
                    <option value="Disaster / Rescue">Disaster / Rescue</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Live Location</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-location-dot"></i>
                <input type="text" id="address" placeholder="Area, Street, City" required>
            </div>
        </div>
        
        <div class="form-group">
            <label>Distance from Station</label>
            <div class="distance-wrapper">
                <div class="input-wrapper" style="width: 100%;">
                    <i class="fa-solid fa-route"></i>
                    <input type="number" step="0.1" id="distance" placeholder="Enter distance" required>
                </div>
                <span class="distance-suffix">KM</span>
            </div>
        </div>

        <button type="submit" id="submitBtn">
            <span>GENERATE EMERGENCY ALERT</span>
            <i class="fa-solid fa-arrow-right"></i>
        </button>
    </form>
    
    <div class="footer">
        <i class="fa-solid fa-shield-halved"></i>
        Stay Safe - Serving Pakistan 24/7
    </div>
</div>

<!-- Success Modal -->
<div id="status-modal">
    <div class="modal-content">
        <div class="modal-icon">
            <i class="fa-solid fa-check"></i>
        </div>
        <h2 class="modal-title">Alert Dispatched!</h2>
        <p class="modal-text">Your emergency request has been sent to the nearest Rescue 1122 station. Please stay calm, help is on the way.</p>
        
        <!-- Cost summary -->
        <div id="cost-summary" style="background: #f3f4f6; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: left; font-size: 14px; display: none;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                <span style="color: #6b7280;">Service Type:</span>
                <span id="summary-type" style="font-weight: 600; color: #1f2937;">Ambulance</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                <span style="color: #6b7280;">Priority Level:</span>
                <span id="summary-priority" style="font-weight: 600; color: #1f2937;">Standard</span>
            </div>
            <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 10px 0;">
            <div style="display: flex; justify-content: space-between;">
                <span style="color: #6b7280; font-weight: 600;">Total Payable:</span>
                <span id="summary-cost" style="font-weight: 700; color: #006633; font-size: 16px;">Rs. 0.00 (PKR)</span>
            </div>
        </div>

        <button class="close-btn" onclick="closeModal()">Understood</button>
    </div>
</div>

<script>
    const form = document.getElementById('emergencyForm');
    const modal = document.getElementById('status-modal');
    const btn = document.getElementById('submitBtn');
    
    // PKR Calculation Logic
    function calculatePKR(distance) {
        let baseTax = 300.0;
        let ratePerKm = 95.0;
        let prioritySurcharge = 0;
        let priorityLevel = "Standard";
        
        if (distance <= 5.0) {
            prioritySurcharge = 150.0;
            priorityLevel = "CRITICAL";
        } else if (distance > 5.0 && distance <= 15.0) {
            prioritySurcharge = 50.0;
            priorityLevel = "URGENT";
        }
        
        let total = baseTax + (distance * ratePerKm) + prioritySurcharge;
        return { total, priorityLevel };
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Add loading state
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Processing System Data...';
        btn.style.opacity = '0.8';
        
        // Form Data
        const type = document.getElementById('type').value;
        const distance = parseFloat(document.getElementById('distance').value);
        
        // Calculate Cost
        const result = calculatePKR(distance);
        
        document.getElementById('summary-type').textContent = type;
        document.getElementById('summary-priority').textContent = result.priorityLevel;
        document.getElementById('summary-cost').textContent = `Rs. ${result.total.toFixed(2)} (PKR)`;
        
        // Simulate network request & logic processing
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.opacity = '1';
            
            document.getElementById('cost-summary').style.display = 'block';
            modal.style.display = 'flex';
            
            // form.reset(); // Optionally reset form
        }, 1800);
    });

    function closeModal() {
        modal.style.display = 'none';
        form.reset();
        document.getElementById('cost-summary').style.display = 'none';
    }
</script>

</body>
</html>
